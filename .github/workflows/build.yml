name: Build Xbox Appx
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Runtime Libraries and Assets
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\download_libs.ps1
          .\download_assets.ps1

      - name: Run Build with Injected Paths
        uses: bcomones/run-vcpkg-action@v1
        with:
          run: |
            powershell -Command "Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass; .\build.ps1"
