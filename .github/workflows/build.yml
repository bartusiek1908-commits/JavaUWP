name: Build Xbox Appx
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows UWP Build Tools
        run: |
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --add Microsoft.VisualStudio.Workload.Universal --passive --norestart

      - name: Download Runtime Libraries and Assets
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\download_libs.ps1
          .\download_assets.ps1

      - name: Run Main Build Script
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass
          .\build.ps1

      - name: Upload Finished Appx Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Xbox-Offline-Installer
          path: |
            **/*.appx
            **/*.msix
            
